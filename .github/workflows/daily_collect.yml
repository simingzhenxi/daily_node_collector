name: Daily Node Collector

on:
  schedule:
    - cron: '59 15 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    permissions:
      contents: write   # ⭐ 必须加

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 chardet pyyaml

      - name: Run collector
        run: python daily_node_collector.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p collected_nodes   # 防止目录不存在
          git add .github/workflows/daily_collect.yml
          git add README.md
          git add daily_node_collector.py
          git add collected_nodes/

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update nodes $(date -u +%Y-%m-%d)"

          git pull --rebase || true

          git push origin main
