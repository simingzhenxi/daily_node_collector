name: Daily Node Collector

on:
  schedule:
    # Run daily at 15:59 UTC (23:59 Beijing Time)
    - cron: '59 15 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 chardet

      - name: Run collector
        run: python daily_node_collector.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collected_nodes/
          if git diff --cached --quiet; then
            echo "No new nodes collected, skipping commit."
          else
            git commit -m "Update nodes $(date -u +%Y-%m-%d)"
            git push
          fi
